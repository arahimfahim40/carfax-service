services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-carfax_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-carfax_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so it points at the compose-managed Postgres
      # rather than localhost. Schema kept as `reports` to match prisma config.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-carfax_db}?schema=reports
      PORT: 8003
      PLAYWRIGHT_HEADLESS: "true"
    ports:
      - "${PORT:-8003}:8003"
    volumes:
      # Persist saved VHR reports and Playwright auth sessions across restarts.
      - reports:/app/.reports
      - auth:/app/.auth

volumes:
  db-data:
  reports:
  auth:
